<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>MIDORI GALLERY</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Anton&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />

    <script src="script.js" defer></script>
  </head>

  <body>
    <!-- BG -->

    <div class="bg-light bg1"></div>
    <div class="bg-light bg2"></div>

    <!-- HEADER -->

    <header class="header">
      <div class="logo">KD🌱</div>

      <a href="index.html" class="back-btn"> ← BACK </a>
    </header>

    <!-- HERO -->

    <section class="gallery-hero">
      <p class="mini">MIDORI GALLERY</p>

      <h1>
        BEAUTY<br />
        IN GREEN
      </h1>

      <p class="hero-text">
        ギャルっぽさの中にある、<br />

        上品さと透明感。<br /><br />

        加藤大樹の持つ<br />

        “今っぽい中性的な魅力” を<br />

        切り取ったギャラリー💚
      </p>
    </section>

    <!-- GALLERY -->

    <section class="gallery">
      <!-- PHOTO -->

      <div class="photo rotate-left fade-up">
        <img src="images/2.JPG" />

        <div class="photo-sticker">★</div>
      </div>

      <!-- PHOTO -->

      <div class="photo rotate-right fade-up">
        <img src="images/3.JPG" />

        <div class="mini-tag">green boy</div>
      </div>

      <!-- PHOTO -->

      <div class="photo fade-up">
        <img src="images/8.JPG" />

        <div class="photo-heart">♡</div>
      </div>

      <!-- PHOTO -->

      <div class="photo rotate-left fade-up">
        <img src="images/9.JPG" />
      </div>

      <!-- PHOTO -->

      <div class="photo rotate-right fade-up">
        <img src="images/10.JPG" />

        <div class="mini-star">★</div>
      </div>

      <!-- PHOTO -->

      <div class="photo fade-up">
        <img src="images/11.JPG" />
      </div>
    </section>

    <!-- QUOTE -->

    <section class="quote">
      <p>
        “ただ派手なだけじゃない。<br />

        <span> 優しさも、努力も、表情も、 </span><br />

        全部が魅力になる人。”
      </p>
    </section>

    <!-- FINAL -->

    <section class="gallery-final">
      <p class="gallery-final-mini">MIDORI ROOM</p>

      <h2>still my favorite 🌱</h2>

      <a href="index.html" class="gallery-btn"> BACK HOME </a>
    </section>

    <!-- FOOTER -->

    <footer class="footer">
      <p>KATO DAIKI MIDORI ROOM 🌱</p>
    </footer>
  </body>
</html>
